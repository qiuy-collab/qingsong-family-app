<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - 轻松智派</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b8cee",
              "background-light": "#f6f7f8",
              "background-dark": "#101922",
            },
            fontFamily: {
              "display": ["Lexend", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Lexend', "Noto Sans SC", sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<div class="relative flex h-auto w-full flex-col bg-transparent">
<div class="flex items-center p-4 pb-2 justify-between">
<button class="p-2 text-[#0d141b] dark:text-white">
<span class="material-symbols-outlined">close</span>
</button>
<div class="text-primary font-medium">帮助</div>
</div>
</div>
<!-- Login Content Container -->
<div class="flex-1 flex flex-col px-6 pt-8 pb-12 max-w-[480px] mx-auto w-full">
<!-- Logo and Branding Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-20 h-20 bg-primary rounded-full flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-5xl">health_and_safety</span>
</div>
<h1 class="text-[#0d141b] dark:text-white tracking-tight text-[32px] font-bold leading-tight text-center">
                欢迎回来
            </h1>
<p class="text-[#4c739a] dark:text-slate-400 mt-2 text-center text-base">
                轻松智派 - 智慧养老，温情守护
            </p>
</div>
<!-- Login Form -->
<div class="space-y-4">
<!-- Phone Number Input -->
<div class="flex flex-col w-full">
<p class="text-[#0d141b] dark:text-white text-sm font-medium leading-normal pb-2 px-1">手机号</p>
<div class="relative group">
<input class="form-input flex w-full rounded-full text-[#0d141b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#cfdbe7] dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-[#4c739a] px-6 text-base font-normal leading-normal transition-all" placeholder="请输入手机号" type="tel" value=""/>
</div>
</div>
<!-- Verification Code Input -->
<div class="flex flex-col w-full">
<p class="text-[#0d141b] dark:text-white text-sm font-medium leading-normal pb-2 px-1">验证码</p>
<div class="flex w-full items-stretch relative">
<input class="form-input flex w-full rounded-full text-[#0d141b] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#cfdbe7] dark:border-slate-700 bg-white dark:bg-slate-800 h-14 placeholder:text-[#4c739a] px-6 text-base font-normal leading-normal transition-all" placeholder="请输入验证码" type="number"/>
<button class="absolute right-2 top-2 bottom-2 px-4 bg-primary/10 dark:bg-primary/20 text-primary font-medium rounded-full text-sm hover:bg-primary/20 transition-colors">
                        获取验证码
                    </button>
</div>
</div>
<!-- Main Login Button -->
<div class="pt-6">
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-full shadow-lg shadow-primary/25 transition-all active:scale-[0.98]">
                    登录
                </button>
</div>
</div>
<!-- WeChat Login Section -->
<div class="mt-auto pt-12">
<div class="relative flex items-center justify-center mb-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-[#cfdbe7] dark:border-slate-800"></div>
</div>
<div class="relative px-4 bg-background-light dark:bg-background-dark">
<span class="text-sm text-[#4c739a]">其他登录方式</span>
</div>
</div>
<div class="flex justify-center">
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 bg-white dark:bg-slate-800 border border-[#cfdbe7] dark:border-slate-700 rounded-full flex items-center justify-center text-[#1AAD19] group-hover:scale-110 transition-transform shadow-sm">
<svg class="w-8 h-8 fill-current" viewbox="0 0 24 24">
<path d="M8.281 12.188c0-.391.313-.703.703-.703h5.273c.391 0 .703.313.703.703s-.313.703-.703.703H8.984a.711.711 0 0 1-.703-.703zm0-2.813c0-.391.313-.703.703-.703h5.273c.391 0 .703.313.703.703s-.313.703-.703.703H8.984a.711.711 0 0 1-.703-.703zm7.031-4.219c-4.453 0-8.086 3.125-8.086 6.992 0 2.148 1.133 4.062 2.891 5.391l-.742 2.227 2.539-1.25a8.7 8.7 0 0 0 3.398.703c4.453 0 8.086-3.125 8.086-6.992s-3.633-7.072-8.086-7.072zM1.953 8.32c0 3.398 2.813 6.133 6.641 6.133.586 0 1.172-.039 1.719-.156l1.953.977-.547-1.758c1.328-1.055 2.148-2.5 2.148-4.102 0-3.398-2.813-6.172-6.641-6.172-3.828.039-7.273 2.813-7.273 6.178z"></path>
</svg>
</div>
<span class="text-xs text-[#4c739a] font-medium">微信一键登录</span>
</button>
</div>
</div>
<!-- Agreement Section -->
<div class="mt-8 flex items-start gap-2 px-4">
<input class="mt-1 w-4 h-4 rounded text-primary focus:ring-primary border-[#cfdbe7] bg-white dark:bg-slate-800" id="agreement" type="checkbox"/>
<label class="text-xs text-[#4c739a] leading-relaxed" for="agreement">
                我已阅读并同意 <span class="text-primary font-medium">《用户协议》</span> 和 <span class="text-primary font-medium">《隐私政策》</span>，并授权轻松智派使用您的手机号进行便捷登录。
            </label>
</div>
</div>
<!-- Bottom Indicator for iOS-like feel -->
<div class="h-5 flex justify-center items-end pb-2">
<div class="w-32 h-1 bg-slate-200 dark:bg-slate-700 rounded-full"></div>
</div>
</body></html>
